name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: apt-get update && apt-get install -y --no-install-recommends git zstd libsqlite3-dev

      - name: Inject version
        run: |
          TAG="${GITHUB_REF_NAME}"
          SHA="${GITHUB_SHA}"
          cat > Sources/wuhu/Version.swift << EOF
          enum WuhuVersion {
              static let version: String = "${TAG}"
              static let gitCommit: String = "${SHA}"
              static var display: String {
                  let shortCommit = gitCommit == "unknown" ? "local" : String(gitCommit.prefix(7))
                  return "\(version) (\(shortCommit))"
              }
              static var platform: String {
                  #if os(Linux) && arch(x86_64)
                  return "linux-x86_64"
                  #elseif os(Linux) && arch(arm64)
                  return "linux-arm64"
                  #elseif os(macOS) && arch(arm64)
                  return "macos-arm64"
                  #elseif os(macOS) && arch(x86_64)
                  return "macos-x86_64"
                  #else
                  return "unknown"
                  #endif
              }
          }
          EOF
          echo "Injected version: ${TAG} (${SHA})"

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            .swiftpm
          key: release-${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            release-${{ runner.os }}-spm-

      - name: Build release
        run: swift build -c release --product wuhu --static-swift-stdlib

      - name: Strip & package
        run: |
          BIN="$(swift build -c release --show-bin-path)/wuhu"
          strip --strip-debug "$BIN"
          tar czf wuhu-linux-x86_64.tar.gz -C "$(dirname "$BIN")" wuhu
          ls -lh wuhu-linux-x86_64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wuhu-linux-x86_64
          path: wuhu-linux-x86_64.tar.gz

  build-macos:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version
        run: |
          TAG="${GITHUB_REF_NAME}"
          SHA="${GITHUB_SHA}"
          cat > Sources/wuhu/Version.swift << EOF
          enum WuhuVersion {
              static let version: String = "${TAG}"
              static let gitCommit: String = "${SHA}"
              static var display: String {
                  let shortCommit = gitCommit == "unknown" ? "local" : String(gitCommit.prefix(7))
                  return "\(version) (\(shortCommit))"
              }
              static var platform: String {
                  #if os(Linux) && arch(x86_64)
                  return "linux-x86_64"
                  #elseif os(Linux) && arch(arm64)
                  return "linux-arm64"
                  #elseif os(macOS) && arch(arm64)
                  return "macos-arm64"
                  #elseif os(macOS) && arch(x86_64)
                  return "macos-x86_64"
                  #else
                  return "unknown"
                  #endif
              }
          }
          EOF
          echo "Injected version: ${TAG} (${SHA})"

      - name: Build release
        run: xcrun swift build -c release --product wuhu

      - name: Strip & package
        run: |
          BIN="$(xcrun swift build -c release --show-bin-path)/wuhu"
          strip -S "$BIN"
          tar czf wuhu-macos-arm64.tar.gz -C "$(dirname "$BIN")" wuhu
          ls -lh wuhu-macos-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wuhu-macos-arm64
          path: wuhu-macos-arm64.tar.gz

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wuhu-linux-x86_64/wuhu-linux-x86_64.tar.gz
            wuhu-macos-arm64/wuhu-macos-arm64.tar.gz
          generate_release_notes: true
